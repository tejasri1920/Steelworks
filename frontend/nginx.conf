# frontend/nginx.conf
#
# Nginx configuration for serving the React SPA and proxying API calls.
#
# Key behaviours:
#   1. Serves static files from /usr/share/nginx/html (the Vite build output).
#   2. Redirects unknown routes to index.html so React Router handles navigation
#      (without this, refreshing a sub-page like /lots/LOT-A would 404).
#   3. Proxies /api/* requests to the backend container (defined as "backend:8000"
#      in Docker Compose's internal DNS).

server {
    listen       80;
    server_name  _;    # Matches any server name

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Static assets ────────────────────────────────────────────────────────
    # Try to serve the file; if not found, fall back to index.html so that
    # React Router can handle the route client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ────────────────────────────────────────────────────────────
    # Forwards /api/* to the FastAPI backend.  The frontend makes requests to
    # /api/v1/... and Nginx forwards them to http://backend:8000/api/v1/...
    # This avoids CORS issues in production (same origin from the browser's
    # perspective).
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
